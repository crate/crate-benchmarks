[setup]
statement_files = [
  "sql/id_int_value_str.sql",
  "sql/uservisits.sql"
]
statements = [
  "create table tbl (id integer, value string) with (number_of_replicas = 0)",
  "create function f3(integer) returns integer language javascript as 'function f3(x) { return x * 3; }'",
  """
  create table udf_gen (
    id int primary key,
    value bigint,
    x generated always as f3(value) check (f3(x) > 0)
  ) with (number_of_replicas = 0)
  """
]

[[load_data]]
target = "id_int_value_str"
source = "data/id_int_value_str.json"
bulk_size = 1000
concurrency = 1
num_records = 1000000

[[load_data]]
target = "udf_gen"
source = "data/id_int_value_str.json"
bulk_size = 1000
concurrency = 1
num_records = 1000000

